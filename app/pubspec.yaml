name: agriscan
description: "AgriScan — AI-powered Plant Disease Detection App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Image Capture & Picking
  camera: ^0.11.0+2
  image_picker: ^1.1.2

  tflite_flutter: ^0.12.1

  # Image processing
  image: ^4.2.0

  # Firebase (stubbed — configure when Firebase project is ready)
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Utilities
  shared_preferences: ^2.3.2
  path_provider: ^2.1.4
  intl: ^0.19.0
  uuid: ^4.5.1
  percent_indicator: ^4.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/ml/
